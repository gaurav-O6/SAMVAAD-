<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMVAAD | Sign Language Mode</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
    min-height:100vh;
    background: linear-gradient(135deg, #000000, #203a43, #000000);
    color:white;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header { 
    padding:20px 60px; 
    display:flex; 
    align-items:center; 
    justify-content:space-between;
    animation: fadeIn 0.8s ease-out;
}
header h1 { 
    font-size:28px; 
    font-weight:600; 
    cursor:pointer;
    transition: transform 0.3s;
}
header h1:hover {
    transform: scale(1.05);
}
header span { color:#00ffcc; }

/* BACK BUTTON */
#back-btn { 
    position:absolute; 
    top:25px; 
    right:40px; 
    padding:10px 22px; 
    background:#00ffcc; 
    color:#000; 
    border:none; 
    border-radius:25px; 
    cursor:pointer; 
    font-weight:600; 
    font-size:16px; 
    z-index:10;
    transition: all 0.3s;
}
#back-btn:hover { 
    background:#00ddb3;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0,255,204,0.4);
}

/* MAIN DISPLAY */
#main-display {
    flex:1;
    margin:30px auto;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    position:relative;
    width:90%;
    max-width:550px;
    height:360px;
    border:2px solid #00ffcc;
    box-shadow:0 0 20px rgba(0,255,204,0.4);
    overflow:hidden;
    animation: fadeInUp 1s ease-out;
}

/* Avatar */
#avatar { 
    position:absolute; 
    inset:0; 
    display:flex; 
    flex-direction: column;
    align-items:center; 
    justify-content:center; 
    font-size:18px; 
    color:#00ffcc; 
    z-index:1;
    gap: 15px;
}

#avatar-icon {
    font-size: 64px;
    animation: float 3s ease-in-out infinite;
}

/* Camera feed */
#camera-feed { 
    position:absolute; 
    inset:0; 
    width:100%; 
    height:100%; 
    object-fit:cover; 
    transform:scaleX(-1); 
    display:none; 
    z-index:2; 
}

/* STATUS MESSAGE - UNIFIED POSITION */
#status-msg {
    text-align:center;
    margin:15px auto 10px;
    font-size:14px;
    color:#00ffcc;
    min-height:20px;
    width:90%;
    max-width:550px;
}

/* INPUT BAR */
#input-bar { 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    gap:12px; 
    margin:10px auto 15px;
    flex-wrap:wrap; 
    width:90%; 
    max-width:550px; 
}
#input-bar input[type="text"] { 
    padding:12px 16px; 
    border-radius:25px; 
    border:none; 
    width:300px; 
    font-size:16px;
}

/* ICON BUTTONS */
.icon-btn { 
    background:#00ffcc; 
    border:none; 
    color:#000; 
    padding:12px; 
    border-radius:50%; 
    cursor:pointer; 
    font-size:18px; 
    transition:all 0.3s; 
}
.icon-btn:hover { 
    background:#00ddb3;
    transform: scale(1.1);
}

/* MIC ACTIVE */
.mic-active { 
    background:#ff4d4d !important; 
    box-shadow:0 0 15px rgba(255,77,77,0.8); 
    animation:pulse 1.2s infinite; 
}
@keyframes pulse { 
    0%{transform:scale(1)} 
    50%{transform:scale(1.1)} 
    100%{transform:scale(1)} 
}

/* ACTION BUTTONS */
.controls { 
    display:flex; 
    justify-content:center; 
    gap:20px; 
    margin:0 auto 15px;
    flex-wrap:wrap;
    width:90%;
    max-width:550px;
}
.action { 
    padding:12px 28px; 
    border-radius:25px; 
    border:none; 
    background:#00ffcc; 
    color:#000; 
    font-weight:600; 
    cursor:pointer; 
    transition:all 0.3s; 
}
.action:hover { 
    background:#00ddb3; 
    box-shadow:0 0 15px rgba(0,255,204,0.5);
    transform: translateY(-2px);
}

.action:disabled {
    background:#555;
    cursor:not-allowed;
    opacity:0.5;
}

/* OUTPUT BAR */
#output-bar { 
    display:none; 
    align-items:center; 
    justify-content:space-between; 
    width:90%; 
    max-width:550px; 
    margin:10px auto 15px; 
    gap:14px; 
}
#recognized-text { 
    flex:1; 
    padding:12px 16px; 
    border-radius:25px; 
    border:none; 
    background: rgba(255,255,255,0.1); 
    color:#fff; 
    font-size:16px; 
    margin-right:10px; 
}
.output-actions { 
    display:flex; 
    gap:10px; 
}
#speaker-btn, #back-camera-btn { 
    background:#00ffcc; 
    border:none; 
    color:#000; 
    border-radius:50%; 
    padding:12px; 
    cursor:pointer; 
    font-size:18px;
    transition: all 0.3s;
}
#speaker-btn:hover, #back-camera-btn:hover { 
    background:#00ddb3;
    transform: scale(1.1);
}

/* FOOTER */
footer { 
    text-align:center; 
    padding:20px 15px; 
    font-size:12px; 
    opacity:0.7;
    line-height: 1.6;
}

footer strong {
    color: #00ffcc;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-10px);
    }
}

/* Mobile responsiveness */
@media (max-width: 600px) {
    header {
        padding: 20px 30px;
    }
    
    #back-btn {
        right: 20px;
    }
    
    #main-display {
        height: 280px;
    }
    
    #input-bar input[type="text"] {
        width: 200px;
    }
}
</style>
</head>

<body>

<header>
    <h1 onclick="window.location.href='index.html'"><span>SAM</span>VAAD</h1>
</header>

<button id="back-btn" onclick="window.location.href='options.html'">←</button>

<main id="main-display">
    <div id="avatar">
        <div id="avatar-icon">🤟</div>
        <div>Click camera to start Sign Recognition</div>
    </div>
    <video id="camera-feed" autoplay playsinline></video>
</main>

<!-- STATUS MESSAGE -->
<div id="status-msg"></div>

<!-- INPUT BAR -->
<div id="input-bar">
    <button id="mic-btn" class="icon-btn" title="Voice input">🎤</button>
    <input type="text" id="text-input" placeholder="Type text here...">
    <button class="icon-btn" onclick="speak(textInput.value)" title="Speak text">🔊</button>
    <button class="icon-btn" onclick="toggleCamera()" title="Start camera">📷</button>
</div>

<!-- ACTION BUTTONS -->
<div class="controls">
    <button class="action" onclick="convertToSign()">Convert → Sign</button>
    <button class="action" onclick="clearText()">Clear Text</button>
</div>

<!-- OUTPUT BAR -->
<div id="output-bar">
    <input type="text" id="recognized-text" placeholder="Recognized text will appear here..." readonly>
    <div class="output-actions">
        <button id="speaker-btn" title="Speak recognized text">🔊</button>
        <button id="back-camera-btn" onclick="toggleCamera()" title="Stop camera">↩️</button>
    </div>
</div>

<footer>
    <strong>SAMVAAD</strong> — Sign and Multimodal Voice Assistive Access & Dialogue<br>
    © 2026 Final Year Engineering Project
</footer>

<script>
const cameraFeed = document.getElementById('camera-feed');
const avatar = document.getElementById('avatar');
const inputBar = document.getElementById('input-bar');
const outputBar = document.getElementById('output-bar');
const controlsDiv = document.querySelector('.controls');
const textInput = document.getElementById('text-input');
const micBtn = document.getElementById('mic-btn');
const recognizedText = document.getElementById('recognized-text');
const speakerBtn = document.getElementById('speaker-btn');
const statusMsg = document.getElementById('status-msg');

let cameraActive = false;
let gestureInterval;
let mediaStream = null;

function showStatus(message, type) {
    statusMsg.textContent = message;
    statusMsg.style.color = type === "error" ? "#ff4d4d" : 
                           type === "success" ? "#00ffcc" : 
                           "#aaa";
    
    if (type !== "error" && message) {
        setTimeout(() => statusMsg.textContent = "", 5000);
    }
}

/* CAMERA TOGGLE */
async function toggleCamera() {
    cameraActive = !cameraActive;

    cameraFeed.style.display = cameraActive ? "block" : "none";
    avatar.style.display = cameraActive ? "none" : "flex";
    inputBar.style.display = cameraActive ? "none" : "flex";
    controlsDiv.style.display = cameraActive ? "none" : "flex";
    outputBar.style.display = cameraActive ? "flex" : "none";

    if (cameraActive) {
        try {
            showStatus("Starting camera...", "info");
            
            mediaStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
            cameraFeed.srcObject = mediaStream;

            cameraFeed.onloadedmetadata = () => cameraFeed.play().catch(err => {
                console.warn("Video play failed:", err);
            });

            fetch("/start")
                .then(() => {
                    showStatus("● Recognizing signs...", "success");
                    gestureInterval = setInterval(fetchGesture, 500);
                })
                .catch(err => {
                    console.error("Backend start failed:", err);
                    showStatus("⚠ Backend not connected", "error");
                });
                
        } catch(err) {
            console.error("Camera access failed:", err);
            showStatus("⚠ Camera access denied", "error");
            
            setTimeout(() => {
                cameraActive = false;
                cameraFeed.style.display = "none";
                avatar.style.display = "flex";
                inputBar.style.display = "flex";
                controlsDiv.style.display = "flex";
                outputBar.style.display = "none";
                statusMsg.textContent = "";
            }, 2000);
        }
    } else {
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
            mediaStream = null;
        }
        cameraFeed.srcObject = null;
        clearInterval(gestureInterval);
        fetch("/stop").catch(err => console.warn("Backend stop failed:", err));
        recognizedText.value = "";
        statusMsg.textContent = "";
    }
}

function fetchGesture() {
    fetch("/result")
        .then(res => res.json())
        .then(data => {
            if (data.text) {
                recognizedText.value = data.text;
            }
        })
        .catch(err => {
            console.error("Error fetching gesture:", err);
            showStatus("⚠ Connection lost", "error");
        });
}

function convertToSign() {
    const text = textInput.value.trim();
    if (!text) {
        showStatus("Please enter some text first", "error");
        return;
    }
    
    showStatus(`Converting "${text}" to sign language... (Feature coming soon)`, "info");
}

function clearText() { 
    textInput.value = '';
    statusMsg.textContent = '';
}

function speak(text) {
    if (!text) return;
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
}

speakerBtn.onclick = () => speak(recognizedText.value);

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
    const rec = new SR();
    rec.lang = "en-US";
    rec.continuous = false;
    
    rec.onstart = () => {
        micBtn.classList.add("mic-active");
        showStatus("Listening...", "info");
    };
    rec.onend = () => micBtn.classList.remove("mic-active");
    rec.onresult = e => {
        textInput.value = e.results[0][0].transcript;
        showStatus(`Heard: "${e.results[0][0].transcript}"`, "success");
    };
    rec.onerror = e => {
        showStatus(`Voice input error: ${e.error}`, "error");
        micBtn.classList.remove("mic-active");
    };
    
    micBtn.onclick = () => {
        try {
            rec.start();
        } catch(e) {
            showStatus("Microphone already active", "error");
        }
    };
} else {
    micBtn.style.display = "none";
}
</script>

</body>
</html>
